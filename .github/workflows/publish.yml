name: Publish to NPM

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., 0.0.15)'
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run typecheck

      - name: Run tests
        run: bun test packages/core/src/ --timeout 30000

      - name: Configure NPM token
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "NPM_TOKEN secret is not set"
            exit 1
          fi
          echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" > .npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to NPM
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          VERSION="${VERSION#v}"
          echo "Publishing version: $VERSION"

          # Sync version to root package.json
          node -e "
            const p=require('./package.json');
            p.version='$VERSION';
            delete p.private;
            require('fs').writeFileSync('./package.json', JSON.stringify(p,null,2)+'\n')
          "

          # Sync version to workspace packages (for local consistency)
          for dir in packages/core packages/cli; do
            node -e "
              const p=require('./$dir/package.json');
              p.version='$VERSION';
              require('fs').writeFileSync('./$dir/package.json', JSON.stringify(p,null,2)+'\n')
            "
          done

          # Publish only the root package (workspace packages are NOT published separately)
          npm publish --access public

          # Restore private: true to root
          node -e "
            const p=require('./package.json');
            p.private=true;
            require('fs').writeFileSync('./package.json', JSON.stringify(p,null,2)+'\n')
          "
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ github.ref_name }}" --title "Release ${{ github.ref_name }}" --notes "See CHANGELOG.md for details." --draft=false
