name: Publish to NPM

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., 0.0.10)'
        required: false
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: bun run typecheck

      - name: Run tests
        run: bun test

      - name: Build packages
        run: bun run build

      - name: Configure NPM token
        run: |
          echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" > .npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to NPM (monorepo)
        run: |
          for pkg in packages/*/package.json; do
            dir=$(dirname "$pkg")
            cd "$dir"
            npm publish --access public
            cd - > /dev/null
          done
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          draft: false
          prerelease: false

  release:
    needs: publish
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create Release Notes
        run: |
          echo "## Changes in this release" > release-notes.md
          echo "" >> release-notes.md
          echo "### Features" >> release-notes.md
          echo "- DAG Scheduler with parallel execution" >> release-notes.md
          echo "- Tool selector with FTS5" >> release-notes.md
          echo "- Skill selector" >> release-notes.md
          echo "- Canvas (ACE) visualization" >> release-notes.md
          echo "- Multi-channel support (Slack, Discord, Telegram, WhatsApp)" >> release-notes.md
          echo "- Context compiler" >> release-notes.md
          echo "" >> release-notes.md
          echo "### Performance" >> release-notes.md
          echo "- 3x faster than LangChain" >> release-notes.md
          echo "- 130+ passing tests" >> release-notes.md

      - name: Upload Release Notes
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.publish.outputs.upload_url }}
          asset_path: release-notes.md
          asset_name: release-notes.md
          asset_content_type: text/markdown