name: Publish to NPM

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., 0.0.15)'
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: bun run typecheck

      - name: Run tests
        run: bun test packages/core/src/ --timeout 30000

      - name: Configure NPM token
        run: echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" > .npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Resolve workspace:* deps and publish
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          VERSION="${VERSION#v}"
          echo "Publishing version: $VERSION"

          # Sync version to all workspace packages
          for pkg in packages/*/package.json; do
            dir=$(dirname "$pkg")
            node -e "
              const p = require('./package.json');
              p.version = '$VERSION';
              require('fs').writeFileSync('./package.json', JSON.stringify(p, null, 2) + '\n');
            " < "$pkg" > /dev/null
            cd "$dir"
            node -e "
              const p = require('./package.json');
              p.version = '$VERSION';
              // Resolve workspace:* deps to actual version
              if (p.dependencies) {
                for (const [k, v] of Object.entries(p.dependencies)) {
                  if (v === 'workspace:*') p.dependencies[k] = '$VERSION';
                }
              }
              require('fs').writeFileSync('./package.json', JSON.stringify(p, null, 2) + '\n');
            "
            cd - > /dev/null
          done

          # Publish in dependency order: core first
          echo "Publishing @hive/core..."
          cd packages/core
          npm publish --access public
          cd ../..

          echo "Publishing @hive/cli..."
          cd packages/cli
          npm publish --access public
          cd ../..

          # Restore workspace:* deps after publish
          cd packages/cli
          node -e "
            const p = require('./package.json');
            if (p.dependencies && p.dependencies['@hive/core']) p.dependencies['@hive/core'] = 'workspace:*';
            require('fs').writeFileSync('./package.json', JSON.stringify(p, null, 2) + '\n');
          "
          cd ../..
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > release-notes.md <<- EOM
          ## What's New

          - @hive/core ${{ github.ref_name }} — Agent framework with Context Engineering, FTS5, ACE, Swarm
          - @hive/cli ${{ github.ref_name }} — CLI tools: init, run, test, trace

          ### Breaking Changes
          - Restructured from 24 packages to 3 (@hive/core, @hive/cli)
          - New high-level API: createAgent, defineTool, defineSkill
          - Gateway, channels, TTS moved to hive-app repo

          ### Changelog
          See [CHANGELOG.md](CHANGELOG.md) for details.
          EOM
          gh release create "${{ github.ref_name }}" \
            --title "Release ${{ github.ref_name }}" \
            --notes-file release-notes.md \
            --draft=false
